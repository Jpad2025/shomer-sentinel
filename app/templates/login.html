<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shomer Sentinel 2.0 — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; font-family: 'Inter', sans-serif; color: #e2e8f0; overflow: hidden; }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }

    /* ── PANEL IZQUIERDO ── */
    .left {
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      border-right: 1px solid #1e2a3a;
      position: relative; overflow: hidden;
      padding: 32px 40px;
    }
    .eyes-img {
      position: absolute;
      top: 5%; left: 50%;
      transform: translateX(-50%);
      width: 120%;
      object-fit: contain;
      z-index: 0;
    }
    .left::before {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 28%, transparent 68%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }
    .left-top, .left-bottom { position: relative; z-index: 2; text-align: center; }
    .brand-name { font-family: 'Orbitron', monospace; line-height: 1.0; letter-spacing: 2px; }
    .brand-name .s1 { display: block; font-size: 44px; font-weight: 900; color: #f5c518; text-shadow: 0 0 28px rgba(245,197,24,0.6); }
    .brand-sub { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 4px; color: #94a3b8; margin-top: 10px; }
    .verse { font-size: 14px; font-style: italic; color: #f5c518; line-height: 1.6; margin-bottom: 4px; text-shadow: 0 0 12px rgba(245,197,24,0.4); }
    .verse-ref { font-size: 12px; color: #94a3b8; }

    /* ── PANEL DERECHO ── */
    .right {
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 48px 60px; position: relative;
    }
    .logo-usb { position: absolute; bottom: 20px; right: 24px; width: 220px; opacity: 0.75; filter: drop-shadow(0 0 6px rgba(13,110,110,0.3)); }
    .form-head { text-align: center; margin-bottom: 36px; }
    .form-head h2 { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; color: #0d6e6e; text-shadow: 0 0 12px rgba(13,110,110,0.4); margin-bottom: 6px; }
    .form-head p { font-size: 12px; color: #64748b; }
    .form { width: 100%; max-width: 340px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1px; color: #64748b; text-transform: uppercase; margin-bottom: 7px; }
    .input-row { position: relative; display: flex; align-items: center; }
    .ico { position: absolute; left: 13px; color: #64748b; pointer-events: none; width: 16px; height: 16px; }
    input[type=text], input[type=password] {
      width: 100%; background: #0d1117; border: 1px solid #1e2a3a; border-radius: 8px;
      padding: 11px 44px; color: #e2e8f0; font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #64748b; font-size: 13px; }
    input:focus { border-color: #0d6e6e; box-shadow: 0 0 0 3px rgba(13,110,110,0.2); }
    .eye-toggle { position: absolute; right: 12px; background: none; border: none; cursor: pointer; color: #64748b; padding: 0; transition: color 0.2s; }
    .eye-toggle:hover { color: #e2e8f0; }
    .btn-enter {
      width: 100%; padding: 13px; background: #0d6e6e; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      font-family: 'Orbitron', monospace; letter-spacing: 2px; cursor: pointer;
      transition: all 0.25s; margin-top: 6px; box-shadow: 0 0 20px rgba(13,110,110,0.35);
    }
    .btn-enter:hover { background: #0f8a8a; box-shadow: 0 0 28px rgba(13,110,110,0.55); transform: translateY(-1px); }
    .btn-enter:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
    .err { display: none; margin-top: 14px; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #ef4444; text-align: center; }
    .err.on { display: block; }
    .spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff; border-radius: 50%; animation: sp 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
  <script src="/static/js/shomer-auth.js?v=3"></script>
</head>

<script>
  function togglePwd() {
    const i = document.getElementById('password'), e = document.getElementById('eye-ico');
    if (i.type === 'password') { i.type = 'text'; e.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'; }
    else { i.type = 'password'; e.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'; }
  }
  function loginErrorMessage(ex, r) {
    if (ex && ex.message && ex.message.indexOf('Failed to fetch') >= 0) {
      return 'No hay conexión con el servidor. Verifique: Tailscale activo, URL con :8443 (https://100.103.148.119:8443) y certificado aceptado.';
    }
    if (r && r.status === 429) return 'Demasiados intentos. Espere 1 minuto e intente de nuevo.';
    if (ex && ex.message) return ex.message;
    return 'Error de conexión con el servidor';
  }
  function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn'), err = document.getElementById('error-msg');
    err.classList.remove('on'); btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>VERIFICANDO...';
    var respStatus = 0;
    shomerFetch('/auth/login', { method: 'POST', body: JSON.stringify({ username: document.getElementById('username').value, password: document.getElementById('password').value }) })
    .then(function(r) {
      respStatus = r.status;
      if (r.status === 429) throw new Error('rate_limit');
      return r.json();
    })
    .then(function(d) {
      if (d.token || d.success) { if (d.token) localStorage.setItem('auth_token', d.token); window.location.href = d.redirect || '/'; }
      else { throw new Error(d.detail || d.message || 'Credenciales incorrectas'); }
    })
    .catch(function(ex) {
      btn.disabled = false; btn.innerHTML = 'INGRESAR AL SISTEMA';
      err.textContent = ex.message === 'rate_limit' ? loginErrorMessage(ex, {status:429}) : loginErrorMessage(ex, {status:respStatus});
      err.classList.add('on');
    });
  }
  function loadSetupHint() {
    shomerFetch('/setup/status')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (!d || !d.needs_setup) return;
        var el = document.getElementById('first-run-banner');
        if (!el) return;
        el.style.display = 'block';
        el.innerHTML = '<strong style="color:#0d6e6e;">Primera instalación</strong><br/>Tras iniciar sesión como <strong style="color:#f5c518;">administrador</strong>, el sistema abrirá el <strong>asistente de red</strong> del mismo panel (no es otra aplicación). Configure la IP y el gateway del cliente antes de continuar.';
      })
      .catch(function() {});
  }
  window.onload = function() {
    document.getElementById('username').focus();
    loadSetupHint();
  };
</script>
