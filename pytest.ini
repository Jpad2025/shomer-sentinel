# Scripts bajo tests/ que no son suite pytest (importan hardware, sys.exit, o credenciales).
# Ejecutarlos a mano: python tests/test_reboot_methods.py
[pytest]
testpaths = tests
addopts =
    --ignore=tests/test_reboot_methods.py
    --ignore=tests/test_recovery.py
    --ignore=tests/test_reboot_full.py
    --ignore=tests/test_http_simple.py
